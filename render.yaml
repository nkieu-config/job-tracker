# Render Blueprint — deploy AI microservice from monorepo root.
# Dashboard: New → Blueprint → connect GitHub repo → apply this file.
services:
  - type: web
    name: job-tracker-ai-service
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build -w @job-tracker/ai-service
    startCommand: npm run start -w @job-tracker/ai-service
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: GEMINI_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
