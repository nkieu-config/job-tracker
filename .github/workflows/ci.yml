name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_tracker_test

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Guard the HNSW index against accidental migration drops
        run: |
          last=$(grep -hoE '(CREATE|DROP) INDEX[^;]*resume_version_embedding_hnsw_idx' prisma/migrations/*/migration.sql | tail -n 1)
          if [[ "$last" != CREATE* ]]; then
            echo '::error::Migrations drop resume_version_embedding_hnsw_idx without recreating it. Re-add the CREATE INDEX to the newest migration (see prisma/migrations/20260709120000_restore_hnsw_index_and_jd_embedding_hash).'
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate` (no DB secrets needed).
      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy
        env:
          DIRECT_URL: ${{ env.TEST_DATABASE_URL }}

      - run: npm run test:coverage

      - name: Advertised test count must match the suite
        run: |
          actual=$(npx vitest list 2>/dev/null | wc -l | tr -d ' ')
          advertised=$( { grep -oE '[0-9]+ tests' README.md; grep -oE 'tests \([0-9]+\)' docs/manual-qa.md; } | grep -oE '[0-9]+' | sort -u )
          if [ -z "$advertised" ]; then
            echo '::error::No advertised test count found in README.md / docs/manual-qa.md — the drift guard has nothing to check.'
            exit 1
          fi
          for n in $advertised; do
            if [ "$n" != "$actual" ]; then
              echo "::error::Docs advertise $n tests but the suite defines $actual. Update the counts in README.md and docs/manual-qa.md."
              exit 1
            fi
          done
          echo "Advertised test count matches the suite: $actual"

      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5433/placeholder
