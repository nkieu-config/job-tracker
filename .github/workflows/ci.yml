name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Workspaces install + postinstall runs prisma generate (no DB secrets needed).
      - run: npm ci

      - run: npm run lint

      - run: npm run check

      - run: npm test
