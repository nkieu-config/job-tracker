name: AI Eval

# Manual only — evals call the real Gemini API (cost + quota), so they are not
# part of the push/PR CI. Run from the Actions tab; the scorecard is uploaded
# as an artifact. Requires a GEMINI_API_KEY repository secret.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run (all | jd-analysis | skill-match | tailoring)"
        required: false
        default: "skill-match"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUITE: ${{ inputs.suite }}
        run: npm run eval -- "$SUITE"

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-report
          path: evals/reports/
